<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jurisprudência — Súmulas e Julgados</title>
  <meta name="theme-color" content="#0f1115" />
  <meta name="description" content="Consulta offline de súmulas e julgados (STF, STJ, TST, TJSP, TJRJ)." />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="icon.svg" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Jurisprudência" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">§</span>
      <div>
        <h1>Jurisprudência</h1>
        <p class="subtitle">Súmulas e julgados — STF · STJ · TST</p>
      </div>
    </div>
    <div class="search-wrap">
      <input id="search" type="search" placeholder="Buscar por número, tema ou texto…" autocomplete="off" />
    </div>
  </header>

  <nav class="filters">
    <div class="filter-group" id="filter-tribunal" aria-label="Filtrar por tribunal"></div>
    <div class="filter-group" id="filter-tipo" aria-label="Filtrar por tipo"></div>
    <button id="fav-toggle" class="chip chip-fav" type="button" aria-pressed="false">★ Favoritos</button>
  </nav>

  <main>
    <div class="results-meta">
      <span id="count">—</span>
      <span id="updated" class="updated"></span>
    </div>
    <ul id="results" class="results"></ul>
    <div id="empty" class="empty" hidden>Nenhum resultado. Ajuste a busca ou os filtros.</div>
  </main>

  <footer class="footer">
    <p>Dados de fontes públicas. Confira sempre o texto oficial no portal do tribunal antes de usar em peça.</p>
  </footer>

  <!-- Dados (carregados como scripts para funcionar offline, sem servidor) -->
  <script src="data/stf-vinculantes.js"></script>
  <script src="data/stf-sumulas.js"></script>
  <script src="data/stj-sumulas.js"></script>
  <script src="data/tst-sumulas.js"></script>
  <script src="data/tjsp-sumulas.js"></script>
  <script src="data/tjrj-sumulas.js"></script>
  <script src="app.js"></script>

  <!-- PWA: registra o service worker para uso offline e instalação -->
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
