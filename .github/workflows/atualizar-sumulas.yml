name: Atualizar jurisprudência

# Roda no dia 1 de cada mês (09:00 UTC ~ 06:00 BRT) e também pode ser
# disparado manualmente pelo botão "Run workflow".
on:
  schedule:
    - cron: "0 9 1 * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils
          pip install -r scripts/requirements.txt

      - name: Rodar parsers (PDF)
        run: |
          # Cada parser é independente: se uma fonte estiver fora/bloquear, registra
          # aviso e segue (mantém o dado antigo daquele tribunal) sem derrubar o resto.
          python scripts/parse_tjsp.py || echo "::warning::parse_tjsp falhou (mantido o dado anterior)"
          python scripts/parse_tjrj.py || echo "::warning::parse_tjrj falhou (mantido o dado anterior)"
          python scripts/parse_stj.py  || echo "::warning::parse_stj falhou (mantido o dado anterior)"
          python scripts/parse_tst.py  || echo "::warning::parse_tst falhou (mantido o dado anterior)"
          python scripts/parse_stf.py  || echo "::warning::parse_stf falhou (mantido o dado anterior)"

      - name: Atualizar OJs e PNs do TST (regenera do livro oficial)
        continue-on-error: true
        run: |
          # O TST bloqueia IPs do GitHub Actions; baixa via proxy público.
          curl -sSL --fail -m 300 "https://api.codetabs.com/v1/proxy/?quest=http://www.tst.jus.br/documents/10157/63003/Livro-Internet.pdf" -o tst-livro.pdf
          pdftotext -layout -enc UTF-8 tst-livro.pdf tst-livro.txt
          pdftotext -enc UTF-8 tst-livro.pdf tst-livro-raw.txt
          perl scripts/gerar_tst_ojs.pl tst-livro.txt
          perl scripts/gerar_tst_pn.pl tst-livro-raw.txt

      - name: Atualizar Repercussão Geral do STF (planilha oficial)
        continue-on-error: true
        run: |
          curl -sL -A "Mozilla/5.0" -o temasrg.xlsx "https://www.stf.jus.br/arquivo/cms/publicacaoBOInternet/anexo/temasrg.xlsx"
          perl scripts/gerar_stf_rg.pl temasrg.xlsx

      - name: Atualizar RG do STF não coberto pela planilha (raspagem tema a tema)
        continue-on-error: true
        run: |
          REF="https://portal.stf.jus.br/jurisprudenciaRepercussao/pesquisarProcesso.asp"
          : > stf-portal.html
          for n in $(seq 1 1550); do
            echo "===TEMA $n===" >> stf-portal.html
            curl -s -A "Mozilla/5.0" -e "$REF" "https://portal.stf.jus.br/jurisprudenciaRepercussao/listarProcesso.asp?numeroTemaInicial=$n" >> stf-portal.html
            sleep 0.08
          done
          perl scripts/gerar_stf_rg_novos.pl stf-portal.html data/stf-rg.js

      - name: Atualizar Recursos Repetitivos do STJ (Dados Abertos)
        continue-on-error: true
        run: |
          B="https://dadosabertos.web.stj.jus.br/dataset/4238da2f-c07b-4c1a-b345-4402accacdcf"
          R="df29da13-7d6b-41ba-ad96-cd1a5bbd191c"
          curl -s -A "Mozilla/5.0" -c jar "$B" -o /dev/null
          curl -s -A "Mozilla/5.0" -b jar -e "$B" "$B/resource/$R/download/temas.csv" -o stj-temas.csv
          perl scripts/gerar_stj_rep.pl stj-temas.csv

      - name: Gerar página estática (dados.html)
        run: perl scripts/gerar_estatico.pl

      - name: Bump do cache do service worker (se os dados mudaram)
        run: |
          if ! git diff --quiet -- data/ dados.html; then
            STAMP=$(date -u '+%Y%m%d%H%M')
            sed -i "s/const CACHE = \"[^\"]*\";/const CACHE = \"juris-auto-$STAMP\";/" sw.js
            echo "Cache do SW atualizado para juris-auto-$STAMP (PWAs instalados recebem os novos dados)."
          else
            echo "Sem mudanças nos dados; cache do SW mantido."
          fi

      - name: Gerar resumo do PR
        id: resumo
        run: |
          {
            echo "## Atualização automática de súmulas"
            echo
            echo "Gerado em $(date -u '+%Y-%m-%d %H:%M UTC') pela automação mensal."
            echo
            if git diff --quiet -- data/; then
              echo "_Nenhuma mudança detectada nas fontes._"
            else
              echo "### Mudanças por arquivo"
              git diff --numstat -- data/ | while read add del file; do
                echo "- \`$file\`: +$add / -$del linhas"
              done
            fi
            echo
            echo "> Revise o diff antes de mesclar. As súmulas vêm de fontes"
            echo "> públicas — confira sempre o texto oficial no portal do tribunal."
          } > pr_body.md
          cat pr_body.md

      - name: Abrir Pull Request (se houver mudanças)
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: main
          branch: auto/atualizar-sumulas
          delete-branch: true
          add-paths: |
            data/*.js
            dados.html
            sw.js
          commit-message: "Atualiza jurisprudência automaticamente (súmulas, OJs, PNs, RG, repetitivos)"
          title: "Atualização automática de jurisprudência"
          body-path: pr_body.md
