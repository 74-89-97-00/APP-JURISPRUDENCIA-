name: Atualizar jurisprudência

# Roda no dia 1 de cada mês (09:00 UTC ~ 06:00 BRT) e também pode ser
# disparado manualmente pelo botão "Run workflow".
on:
  schedule:
    - cron: "0 9 1 * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils
          pip install -r scripts/requirements.txt

      - name: Rodar parsers (PDF)
        run: |
          # Cada parser é independente: se uma fonte estiver fora/bloquear, registra
          # aviso e segue (mantém o dado antigo daquele tribunal) sem derrubar o resto.
          python scripts/parse_tjsp.py || echo "::warning::parse_tjsp falhou (mantido o dado anterior)"
          python scripts/parse_tjrj.py || echo "::warning::parse_tjrj falhou (mantido o dado anterior)"
          python scripts/parse_stj.py  || echo "::warning::parse_stj falhou (mantido o dado anterior)"
          python scripts/parse_tst.py  || echo "::warning::parse_tst falhou (mantido o dado anterior)"
          # STF súmulas COMUNS (1–736): conjunto congelado, já completo no repo.
          # O WAF do STF agora é contornado por headers de navegador (comum.py),
          # então o parser deve voltar a rodar; se a fonte cair, segue sem quebrar.
          python scripts/parse_stf.py  || echo "::warning::parse_stf falhou (mantido o dado anterior)"

      - name: Atualizar OJs e PNs do TST (regenera do livro oficial)
        continue-on-error: true
        run: |
          URL="http://www.tst.jus.br/documents/10157/63003/Livro-Internet.pdf"
          # O TST barra o IP do runner: tenta direto e via proxy público
          # (codetabs), repetindo até vir o livro COMPLETO (~3,5 MB). A trava em
          # 3.490.000 bytes garante o PDF inteiro (os PNs ficam no fim do livro;
          # um download truncado os perderia).
          ok=""
          for tentativa in 1 2 3 4 5; do
            for src in "$URL" "https://api.codetabs.com/v1/proxy/?quest=$URL"; do
              curl -sSL --fail -m 300 -A "Mozilla/5.0" "$src" -o tst-livro.pdf || continue
              BYTES=$(stat -c%s tst-livro.pdf 2>/dev/null || echo 0)
              if head -c4 tst-livro.pdf 2>/dev/null | grep -q '%PDF' && [ "$BYTES" -ge 3490000 ]; then
                ok=1; break 2
              fi
            done
            sleep 5
          done
          if [ -z "$ok" ]; then
            echo "::warning::TST: não obtive o livro COMPLETO (proxy fora/limitado) — OJ/PN mantidos."
            exit 0
          fi
          # O pdftotext do runner (poppler novo) extrai o livro de forma mais
          # COMPLETA que o local antigo (capta 709 OJs reais vs 703) — é a fonte
          # autoritativa. O parser dedupa por (seção,número) e descarta refs
          # cruzadas (guard de ordem), mantendo o resultado consistente.
          pdftotext -layout -enc UTF-8 tst-livro.pdf tst-livro.txt
          pdftotext -enc UTF-8 tst-livro.pdf tst-livro-raw.txt
          perl scripts/gerar_tst_ojs.pl tst-livro.txt
          perl scripts/gerar_tst_pn.pl tst-livro-raw.txt

      - name: Atualizar Repercussão Geral do STF (planilha oficial)
        continue-on-error: true
        run: |
          # O WAF do STF dá 403 a curl "cru"; só libera com headers de navegador.
          HDR=(-H 'Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8'
               -H 'Accept-Language: pt-BR,pt;q=0.9,en;q=0.8'
               -H 'sec-ch-ua: "Chromium";v="124", "Google Chrome";v="124", "Not-A.Brand";v="99"'
               -H 'sec-ch-ua-mobile: ?0' -H 'sec-ch-ua-platform: "Windows"'
               -H 'Sec-Fetch-Dest: document' -H 'Sec-Fetch-Mode: navigate'
               -H 'Sec-Fetch-Site: none' -H 'Upgrade-Insecure-Requests: 1')
          UA='Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0 Safari/537.36'
          # -k: a cadeia de certificado do STF é incompleta no runner (curl 60);
          # arquivo público, só leitura. ${HDR[@]} + UA driblam o WAF (403).
          curl -sL --fail -k -m 120 --compressed -A "$UA" "${HDR[@]}" -o temasrg.xlsx \
            "https://www.stf.jus.br/arquivo/cms/publicacaoBOInternet/anexo/temasrg.xlsx"
          perl scripts/gerar_stf_rg.pl temasrg.xlsx

      - name: Atualizar RG do STF não coberto pela planilha (raspagem tema a tema)
        continue-on-error: true
        run: |
          HDR=(-H 'Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8'
               -H 'Accept-Language: pt-BR,pt;q=0.9,en;q=0.8'
               -H 'sec-ch-ua: "Chromium";v="124", "Google Chrome";v="124", "Not-A.Brand";v="99"'
               -H 'sec-ch-ua-mobile: ?0' -H 'sec-ch-ua-platform: "Windows"'
               -H 'Sec-Fetch-Dest: document' -H 'Sec-Fetch-Mode: navigate'
               -H 'Sec-Fetch-Site: none' -H 'Upgrade-Insecure-Requests: 1')
          UA='Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0 Safari/537.36'
          REF="https://portal.stf.jus.br/jurisprudenciaRepercussao/pesquisarProcesso.asp"
          : > stf-portal.html
          for n in $(seq 1 1550); do
            echo "===TEMA $n===" >> stf-portal.html
            curl -s -k -m 30 --compressed -A "$UA" "${HDR[@]}" -e "$REF" "https://portal.stf.jus.br/jurisprudenciaRepercussao/listarProcesso.asp?numeroTemaInicial=$n" >> stf-portal.html
            sleep 0.08
          done
          perl scripts/gerar_stf_rg_novos.pl stf-portal.html data/stf-rg.js

      - name: Atualizar Súmulas Vinculantes do STF (Wikipédia, sem WAF)
        continue-on-error: true
        run: |
          # O portal e o /arquivo/cms/jurisprudenciaSumula/ do STF têm WAF que
          # barra curl/proxies até de IP residencial (403). A lista de SVs na
          # Wikipédia (API MediaWiki) é estruturada e SEM WAF. O parser é
          # incremental: preserva as entradas já curadas (com tema/área) e só
          # acrescenta SVs novas. As súmulas COMUNS (1–736) estão congeladas e
          # já vêm completas no repositório, por isso não dependem de coleta.
          TITLE="Lista de súmulas vinculantes editadas pelo Supremo Tribunal Federal do Brasil"
          curl -sSL --fail -m 60 -A "Mozilla/5.0 (app-jurisprudencia)" \
            -G "https://pt.wikipedia.org/w/api.php" \
            --data-urlencode "action=parse" \
            --data-urlencode "page=$TITLE" \
            --data-urlencode "prop=wikitext" \
            --data-urlencode "format=json" \
            --data-urlencode "formatversion=2" \
            -o stf-sv-wiki.json
          perl scripts/gerar_stf_sv.pl stf-sv-wiki.json data/stf-vinculantes.js

      - name: Atualizar Recursos Repetitivos do STJ (Dados Abertos)
        continue-on-error: true
        run: |
          B="https://dadosabertos.web.stj.jus.br/dataset/4238da2f-c07b-4c1a-b345-4402accacdcf"
          R="df29da13-7d6b-41ba-ad96-cd1a5bbd191c"
          curl -s -A "Mozilla/5.0" -c jar "$B" -o /dev/null
          curl -s -A "Mozilla/5.0" -b jar -e "$B" "$B/resource/$R/download/temas.csv" -o stj-temas.csv
          perl scripts/gerar_stj_rep.pl stj-temas.csv

      - name: Gerar página estática (dados.html)
        run: perl scripts/gerar_estatico.pl

      - name: Bump do cache do service worker (se os dados mudaram)
        run: |
          if ! git diff --quiet -- data/ dados.html; then
            STAMP=$(date -u '+%Y%m%d%H%M')
            sed -i "s/const CACHE = \"[^\"]*\";/const CACHE = \"juris-auto-$STAMP\";/" sw.js
            echo "Cache do SW atualizado para juris-auto-$STAMP (PWAs instalados recebem os novos dados)."
          else
            echo "Sem mudanças nos dados; cache do SW mantido."
          fi

      - name: Gerar resumo do PR
        id: resumo
        run: |
          {
            echo "## Atualização automática de súmulas"
            echo
            echo "Gerado em $(date -u '+%Y-%m-%d %H:%M UTC') pela automação mensal."
            echo
            if git diff --quiet -- data/; then
              echo "_Nenhuma mudança detectada nas fontes._"
            else
              echo "### Mudanças por arquivo"
              git diff --numstat -- data/ | while read add del file; do
                echo "- \`$file\`: +$add / -$del linhas"
              done
            fi
            echo
            echo "> Revise o diff antes de mesclar. As súmulas vêm de fontes"
            echo "> públicas — confira sempre o texto oficial no portal do tribunal."
          } > pr_body.md
          cat pr_body.md

      - name: Abrir Pull Request (se houver mudanças)
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: main
          branch: auto/atualizar-sumulas
          delete-branch: true
          add-paths: |
            data/*.js
            dados.html
            sw.js
          commit-message: "Atualiza jurisprudência automaticamente (súmulas, OJs, PNs, RG, repetitivos)"
          title: "Atualização automática de jurisprudência"
          body-path: pr_body.md
